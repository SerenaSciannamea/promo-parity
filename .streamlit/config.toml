[theme]
primaryColor             = "#F2CC38"   # giallo Glovo
backgroundColor          = "#FFFEF5"   # bianco caldo (sfondo principale)
secondaryBackgroundColor = "#FFF8D0"   # giallo chiaro (sidebar e card)
textColor                = "#161717"   # quasi nero Glovo
font                     = "sans serif"

[server]
headless            = true
enableCORS          = false
enableXsrfProtection = true

[browser]
gatherUsageStats    = false
