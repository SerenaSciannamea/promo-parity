name: keep-alive

# Tiene sveglia l'app Streamlit Community Cloud.
# NB: un semplice ping HTTP NON basta (Streamlit dorme in base alle sessioni
# reali). Qui carichiamo l'app con un browser headless (Playwright), che apre
# una vera sessione e clicca il bottone di wake-up se l'app e' addormentata.
# GitHub disabilita i workflow schedulati dopo 60 giorni di repo senza commit.

on:
  schedule:
    - cron: "0 */4 * * *"   # ogni 4 ore
  workflow_dispatch:          # avvio manuale dalla tab Actions

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Playwright
        run: |
          pip install --quiet playwright
          python -m playwright install --with-deps chromium
      - name: Visit app (wake if asleep, keep session alive)
        run: python .github/keep_alive.py
