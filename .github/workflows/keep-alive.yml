name: keep-alive

# Tiene sveglia l'app Streamlit Community Cloud con un ping periodico.
# Streamlit mette in standby le app dopo un periodo senza traffico: questo
# ping genera traffico e resetta il timer di inattivita'.
# NB: GitHub disabilita i workflow schedulati dopo 60 giorni di repo INATTIVO
#     (nessun commit). Finche' si committa con regolarita', resta attivo.

on:
  schedule:
    - cron: "0 */3 * * *"   # ogni 3 ore
  workflow_dispatch:          # avvio manuale dalla tab Actions

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Streamlit app
        run: |
          URL="https://promo-parity.streamlit.app/"
          echo "Ping $URL"
          for i in 1 2 3; do
            code=$(curl -sSL --max-time 90 -o /dev/null -w "%{http_code}" "$URL" || echo "000")
            echo "Tentativo $i -> HTTP $code"
            [ "$code" = "200" ] && exit 0
            sleep 30
          done
          echo "Nessun 200 dopo 3 tentativi (l'app potrebbe essere in fase di wake-up). Non fallisco: l'obiettivo e' generare traffico."
